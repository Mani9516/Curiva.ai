# Deploy the FastAPI backend on Render (free tier works for demos).
# Dashboard: https://dashboard.render.com → New → Blueprint → connect this repo.
services:
  - type: web
    name: curiva-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/stats
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
